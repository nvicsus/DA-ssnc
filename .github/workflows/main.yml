name: Create PR in downstream repo

on:
  pull_request:
    types: [opened, reopened, closed]

jobs:
  call-workflow:
    uses: nvicsus/automation/.github/workflows/sync_pr.yml@main
    with:
      trigger_reason: "${{ github.event.action }}"

  debug-step:
    runs-on: ubuntu-latest
    steps:
      - name: Extract PR info
        id: pr
        run: |
          echo "trigger_reson=${{ github.event.action }}" >> $GITHUB_ENV
